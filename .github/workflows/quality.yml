name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - harness-engineering-execution-layer

jobs:
  core-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run stack-neutral core quality
        run: python tools/llm_wiki.py quality --skip-frontend

      - name: Validate task queue
        run: python tools/llm_wiki.py task validate --strict

      - name: Run generated starter self-test
        run: python tools/llm_wiki.py site self-test

  optional-frontend:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Non-blocking frontend security audit
        continue-on-error: true
        run: python tools/llm_wiki.py security audit --json --no-record
