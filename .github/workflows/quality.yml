name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - harness-engineering-execution-layer

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Rebuild wiki index
        run: python tools/llm_wiki.py rebuild

      - name: Lint wiki and harness
        run: python tools/llm_wiki.py lint --strict

      - name: Validate task queue
        run: python tools/llm_wiki.py task validate --strict

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
